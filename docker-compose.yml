version: "3.8"

services:
  nginx:
    build: ./nginx
    image: nginx
    container_name: "nginx_cont"
    ports:
      - "80:80"
    restart: always
    depends_on:
      - django_app
    networks:
      - notes-app-nw

  django_app:
    image: thesanketpawar/notes:latest
    container_name: "django_cont"
    ports:
      - "8000:8000"
    # Note: Aapne yahan gunicorn chalaya hai, toh agar views.py mein runserver jaisa issue ho toh gunicorn error logs check karna hello.
    command: sh -c "python manage.py migrate --noinput && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"
    env_file:
      - ".env"
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app-nw

  
  db:
    image: mysql:latest
    container_name: "db_cont"
    command: --innodb-buffer-pool-size=64M --innodb-log-buffer-size=8M --skip-log-bin
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=test_db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_password
      - MYSQL_ROOT_HOST=%            # <--- MAKE SURE YEH LINE HAI!
    volumes:
      - ./data/mysql/db:/var/lib/mysql
    networks:
      - notes-app-nw
  
networks:
  notes-app-nw:
